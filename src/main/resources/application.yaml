# ==============================================================================
# CONFIGURACIÓN BASE (Compartida)
# ==============================================================================
server:
  port: ${SERVER_PORT:5000}
  use-forward-headers: true

spring:
  application:
    name: vg-ms-apiGateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:https://lab.vallegrande.edu.pe/keycloak}/realms/${KEYCLOAK_REALM:sipreb}

  data:
    redis:
      url: ${REDIS_URL}
      ssl:
        enabled: ${REDIS_SSL}

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

      routes:
        # MS-02: Authentication Service
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:5002}
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**, /api/v1/persons/**, /api/v1/roles/**, /api/v1/permissions/**, /api/v1/assignments/**
          # El filtro solo se aplica si la url apunta al servidor production. Para eso podemos usar un pequeño truco
          # O simplemente configuramos el Ingress del servidor para no requerir PrefixPath

        # MS-01: Tenant Management Service
        - id: tenant-service
          uri: ${TENANT_SERVICE_URL:http://localhost:5001}
          predicates:
            - Path=/api/v1/tenants/**, /api/v1/municipalities/**

        # MS-03: Configuration Service
        - id: configuration-service
          uri: ${CONFIG_SERVICE_URL:http://localhost:5004}
          predicates:
            - Path=/api/v1/config/**, /api/v1/positions/**, /api/v1/document-types/**, /api/v1/system-configurations/**, /api/v1/areas, /api/v1/asset-types/**, /api/v1/maintenance-types/**, /api/v1/depreciation-methods/**

        # MS-04: Patrimonio Service
        - id: patrimonio-service
          uri: ${PATRIMONIO_SERVICE_URL:http://localhost:5003}
          predicates:
            - Path=/api/v1/assets/**, /api/v1/depreciation/**
          filters:
            - StripPrefix=0
        


        # MS-05: Movement Service
        - id: movement-service
          uri: ${MOVEMENT_SERVICE_URL:http://localhost:5005}
          predicates:
            - Path=/api/v1/asset-movements/**, /api/v1/handover-receipts/**

        # MS-06: Inventory Service
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://localhost:5006}
          predicates:
            - Path=/api/v1/inventories/**, /api/v1/inventory-details/**

        # MS-07: Mantenimiento Service
        - id: mantenimiento-service
          uri: ${MANTENIMIENTO_SERVICE_URL:http://localhost:5007}
          predicates:
            - Path=/api/v1/maintenances/**
          filters:
            # StripPrefix=0 significa que envía la ruta TAL CUAL llega.
            # Como tu controlador ya tiene @RequestMapping("/api/v1/maintenances"),
            # StripPrefix debe ser 0.
            - StripPrefix=0

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://lab.vallegrande.edu.pe/sipreb}

ratelimit:
  max-requests: ${RATELIMIT_MAX_REQUESTS:100}
  window-seconds: ${RATELIMIT_WINDOW_SECONDS:60}

resilience4j:
  timelimiter:
    timeout-duration: PT15S

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
    pe.edu.vallegrande: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics}
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:always}
